<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #d9c6ff, #a78bfa, #8b5cf6);
  overflow: hidden;
  padding: 20px;
}

/* Floating stars */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(white 2px, transparent 2px);
  background-size: 40px 40px;
  opacity: 0.25;
  animation: floatStars 60s linear infinite;
}

@keyframes floatStars {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

.card {
  position: relative;
  background: #fdf7ff;
  width: 90%;
  max-width: 500px;
  border-radius: 25px;
  padding: 40px 25px 60px 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  text-align: center;
}

.card h1 {
  font-size: 22px;
  color: #7c3aed;
  margin-bottom: 15px;
}

.message {
  font-size: 15px;
  color: #6b21a8;
  line-height: 1.6;
}

.sparkle {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 20px;
}

/* Coco bigger */
.dog {
  position: absolute;
  bottom: -10px;
  right: 10px;
  width: 160px; /* slightly bigger */
}

@media (max-width: 480px) {
  .dog {
    width: 135px;
    bottom: -5px;
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="sparkle">✨</div>

  <h1>Happy Birthday, My Love 🎂💖</h1>

  <div class="message">
    Today is all about you.  
    The most beautiful soul,  
    the softest heart,  
    and my favorite person in the world.  

    <br><br>

    I’m so grateful I get to celebrate you.  
    May this year bring you happiness,  
    success, and all the love you deserve.  

    <br><br>

    I love you endlessly. 💜✨
  </div>

  <img src="coco.png" class="dog" alt="Coco">

</div>

</body>
</html>

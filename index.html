<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to March 5 🎂</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    width: 100%;
    background: url("coco.png") no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
}

/* Countdown Position (Desktop Default) */
.countdown-wrapper {
    margin-left: 6%;
    width: 38%;
    max-width: 500px;
    min-width: 260px;
    text-align: center;
}

.title {
    font-size: clamp(1.2rem, 2vw, 2rem);
    color: #5c4b8a;
    margin-bottom: 20px;
    font-weight: 600;
}

.countdown {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.time-box {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(6px);
    padding: 18px;
    border-radius: 20px;
}

.time-box h2 {
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    color: #6a5acd;
}

.label {
    font-size: 0.8rem;
    color: #555;
}

.message {
    margin-top: 20px;
    font-size: clamp(0.8rem, 1.5vw, 1rem);
    color: #444;
}

/* 📱 Mobile */
@media (max-width: 600px) {
    body {
        background-position: center top;
        background-size: contain;
        background-color: #bca9e6;
        align-items: flex-start;
        padding-top: 65%;
    }

    .countdown-wrapper {
        width: 90%;
        margin: auto;
    }
}

/* 📲 Tablet Portrait */
@media (min-width: 601px) and (max-width: 1024px) {
    body {
        background-position: center top;
        background-size: contain;
        background-color: #bca9e6;
        align-items: flex-start;
        padding-top: 50%;
    }

    .countdown-wrapper {
        width: 70%;
        margin: auto;
    }
}
</style>
</head>

<body>

<div class="countdown-wrapper">
    <div class="title">Countdown to March 5 🎉</div>

    <div class="countdown">
        <div class="time-box">
            <h2 id="days">0</h2>
            <div class="label">Days</div>
        </div>
        <div class="time-box">
            <h2 id="hours">0</h2>
            <div class="label">Hours</div>
        </div>
        <div class="time-box">
            <h2 id="minutes">0</h2>
            <div class="label">Minutes</div>
        </div>
        <div class="time-box">
            <h2 id="seconds">0</h2>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div class="message">
        Counting the days until we celebrate you 💖
    </div>
</div>

<script>
function updateCountdown() {
    const now = new Date();
    let year = now.getFullYear();
    let birthday = new Date(year, 2, 5);

    if (now > birthday) {
        birthday = new Date(year + 1, 2, 5);
    }

    const diff = birthday - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / 1000 / 60) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown 😅</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Fredoka',sans-serif;
    background:url('bg.png') no-repeat center center/cover;
    position:relative;
    overflow:hidden;
}

/* ================= */
/* MOBILE FIRST */
/* ================= */

.memo-container{
    position:absolute;
    top:30%;              /* higher */
    left:50%;
    transform:translate(-50%,-50%);
    width:92vw;           /* wide but clean */
    max-width:520px;
    z-index:1;
}

.memo-container img{
    width:100%;
}

.memo-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:82%;
    text-align:center;
}

h1{
    font-size:20px;
    margin-bottom:8px;
    color:#5b4bb7;
}

#countdown{
    font-size:28px;
    font-weight:700;
    margin:6px 0;
    background:linear-gradient(45deg,#ffb6d9,#b5e3ff,#fff4a3,#e5c6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.small{
    font-size:13px;
    margin-top:6px;
    color:#5b4bb7;
}

/* 🐶 Dog closer + compact */
.dog{
    position:absolute;
    right:-5px;
    bottom:8%;
    width:290px;
    z-index:2;
}

/* ================= */
/* TABLET */
/* ================= */
@media(min-width:768px){

    .memo-container{
        top:35%;
        width:70vw;
        max-width:750px;
    }

    h1{font-size:26px;}
    #countdown{font-size:40px;}
    .small{font-size:16px;}

    .dog{
        width:420px;
        bottom:6%;
        right:0;
    }
}

/* ================= */
/* DESKTOP */
/* ================= */
@media(min-width:1200px){

    .memo-container{
        top:40%;
        width:850px;
    }

    h1{font-size:34px;}
    #countdown{font-size:56px;}
    .small{font-size:20px;}

    .dog{
        width:650px;
        right:5%;
        bottom:8%;
    }
}

</style>
</head>

<body>

<div class="memo-container">
    <img src="memo.png">
    <div class="memo-content">
        <h1>Countdown to March 5 🎂💖</h1>
        <div id="countdown">Loading...</div>
        <div class="small">Every second brings us closer ✨</div>
    </div>
</div>

<img src="cc.png" class="dog">

<script>
function getNextBirthday(){
    const now=new Date();
    let year=now.getFullYear();
    let birthday=new Date(year,2,5);

    if(now>birthday){
        birthday=new Date(year+1,2,5);
    }

    return birthday;
}

const birthday=getNextBirthday();

function updateCountdown(){
    const now=new Date().getTime();
    const distance=birthday-now;

    if(distance<=0){
        document.getElementById("countdown").innerHTML=
        "🎉 HAPPY BIRTHDAY MY LOVE 💖🎉";
        return;
    }

    const days=Math.floor(distance/(1000*60*60*24));
    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds=Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML=
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>

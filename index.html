<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💙</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #2f3e6b; /* match your blue background */
}

/* Fullscreen container */
.hero {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Image */
.hero img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* 👈 NO CROPPING */
}
</style>
</head>

<body>

<div class="hero">
    <img src="birthday.png" alt="Happy Birthday">
</div>

</body>
</html>

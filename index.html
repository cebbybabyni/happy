<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✨ Happy Birthday Jeam Abby Keith 🎂</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Dancing+Script:wght@500;700&family=Sriracha&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:url('images/bg.png') no-repeat center center fixed;
  background-size:cover;
  margin:0;
  overflow-x:hidden;
}
#wrapper{
  text-align:center;
  padding:40px 20px;
}
h1{
  font-family:'Titan One',sans-serif;
  font-size:3rem;
}
.image{
  width:250px;
  height:250px;
  border-radius:50%;
  overflow:hidden;
  border:6px solid black;
  margin:20px auto;
}
.image img{
  width:100%;
  height:100%;
  object-fit:cover;
}
button{
  background:#FF7882;
  border:none;
  padding:10px 20px;
  border-radius:30px;
  color:white;
  font-size:1rem;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="confetti-canvas"></canvas>

<div id="wrapper">

<h1>Happy Birthday 💖</h1>

<div class="image">
  <img src="images/unnamed.png" alt="profile">
</div>

<p>27 May</p>

<button onclick="alert('Happy Birthday! 💕')">
READ ME 🎂
</button>

</div>

<script>
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces=[];
for(let i=0;i<60;i++){
  pieces.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*4+2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="#FF7882";
    ctx.fill();
    p.y+=1;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

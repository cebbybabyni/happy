<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Fredoka',sans-serif;
    background:url('bg.png') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* 📦 Memo Container */
.memo-container{
    position:relative;
    width:100%;
    max-width:900px;
    aspect-ratio:16 / 10;
}

/* Memo Background */
.memo-bg{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* 💖 Text Area */
.memo-content{
    position:absolute;
    top:42%;
    left:50%;
    transform:translate(-50%,-50%);
    width:55%;
    text-align:center;
}

h1{
    font-size:clamp(22px, 3vw, 40px);
    margin-bottom:12px;
    color:#5b4bb7;
}

.message{
    font-size:clamp(16px, 2vw, 24px);
    color:#6a5acd;
    line-height:1.4;
}

/* 🐶 Bigger Dog */
.dog{
    position:absolute;
    bottom:2%;
    right:3%;
    width:55%;        /* bigger */
    max-width:520px;
}

/* 📱 Landscape Adjustment */
@media (orientation: landscape) {

    .memo-container{
        max-width:700px;
    }

    .dog{
        width:45%;
        max-width:420px;
    }

    .memo-content{
        width:60%;
    }
}

img{
    display:block;
}
</style>
</head>

<body>

<div class="memo-container">
    <img src="memo.png" class="memo-bg">

    <div class="memo-content">
        <h1>🎉 Happy Birthday My Love 🎂💖</h1>
        <div class="message">
            Wishing you a day filled with love, laughter,  
            happiness, and everything your heart desires ✨💗  
            I’m so lucky to celebrate you today 🥰
        </div>
    </div>

    <img src="cc.png" class="dog">
</div>

</body>
</html>

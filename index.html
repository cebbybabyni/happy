<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    font-family:'Fredoka',sans-serif;
    background:url('bg.png') no-repeat center center/cover;
    position:relative;
    overflow:hidden;
}

/* ☁️ Cloud container */
.cloud-container{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    width:900px;
    max-width:95vw;
    z-index:1;
}

.cloud-container img{
    width:100%;
}

/* 💖 Text inside cloud */
.cloud-content{
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70%;
    text-align:center;
}

h1{
    font-size:30px;
    margin-bottom:15px;
    color:#6a5acd;
}

/* ✨ Pastel glowing countdown */
#countdown{
    font-size:46px;
    font-weight:700;
    background:linear-gradient(45deg,#ffb6d9,#b5e3ff,#fff4a3,#e5c6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:
        0 0 10px rgba(255,182,217,0.7),
        0 0 20px rgba(181,227,255,0.6),
        0 0 30px rgba(229,198,255,0.5);
    animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}

.small{
    margin-top:12px;
    font-size:18px;
    color:#6a5acd;
}

/* 🐶 Dog overlapping cloud slightly */
.dog{
    position:absolute;
    right:8%;
    bottom:18%;
    width:560px;
    max-width:60vw;
    z-index:2;
}

/* 📱 Mobile adjustments */
@media(max-width:900px){

    .cloud-container{
        width:110vw;
        top:42%;
    }

    .cloud-content{
        top:38%;
    }

    .dog{
        width:360px;
        bottom:12%;
        right:5%;
    }

    h1{font-size:22px;}
    #countdown{font-size:28px;}
}
</style>
</head>

<body>

<!-- ☁️ Cloud -->
<div class="cloud-container">
    <img src="cloud.png">
    <div class="cloud-content">
        <h1>Countdown to March 5 🎂💖</h1>
        <div id="countdown">Loading...</div>
        <div class="small">Every second brings us closer ✨</div>
    </div>
</div>

<!-- 🐶 Dog -->
<img src="cc.png" class="dog">

<script>
function getNextBirthday(){
    const now=new Date();
    let year=now.getFullYear();
    let birthday=new Date(year,2,5);

    if(now>birthday){
        birthday=new Date(year+1,2,5);
    }

    return birthday;
}

const birthday=getNextBirthday();

function updateCountdown(){
    const now=new Date().getTime();
    const distance=birthday-now;

    if(distance<=0){
        document.getElementById("countdown").innerHTML=
        "🎉 HAPPY BIRTHDAY MY LOVE 💖🎉";
        return;
    }

    const days=Math.floor(distance/(1000*60*60*24));
    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds=Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML=
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>

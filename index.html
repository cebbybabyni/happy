<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

/* Fullscreen container */
.hero {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Background image */
.hero img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;  /* fills entire screen */
    z-index: 0;
}

/* Centered content */
.content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: white;
    padding: 20px;
}

/* Optional text styling */
.content h1 {
    font-size: clamp(28px, 6vw, 60px);
    margin-bottom: 10px;
}

.content p {
    font-size: clamp(14px, 3vw, 22px);
}
</style>
</head>

<body>

<div class="hero">
    <!-- Your image -->
    <img src="birthday.png" alt="Happy Birthday">

    <!-- Centered overlay content -->
    <div class="content">
        <h1>Happy Birthday 🎂</h1>
        <p>A little surprise for you 💖</p>
    </div>
</div>

</body>
</html>

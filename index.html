<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown 🎂</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url("coco.png") no-repeat center center/cover;
    }

    .overlay {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        padding-left: 8%;
    }

    .countdown-container {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(8px);
        padding: 40px;
        border-radius: 30px;
        text-align: center;
        max-width: 450px;
        width: 90%;
    }

    h1 {
        font-size: 2rem;
        color: #5c4b8a;
        margin-bottom: 20px;
    }

    .countdown {
        display: flex;
        justify-content: space-between;
        gap: 15px;
        flex-wrap: wrap;
    }

    .time-box {
        flex: 1 1 45%;
        background: #ffffff;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .time-box h2 {
        font-size: 2rem;
        color: #6a5acd;
    }

    .label {
        font-size: 0.8rem;
        color: #777;
    }

    .message {
        margin-top: 25px;
        color: #444;
        font-size: 0.95rem;
    }

    @media (max-width: 768px) {
        .overlay {
            justify-content: center;
            padding-left: 0;
        }

        .countdown-container {
            margin: 20px;
        }
    }
</style>
</head>

<body>

<div class="overlay">
    <div class="countdown-container">
        <h1>Countdown to March 5 🎉</h1>

        <div class="countdown">
            <div class="time-box">
                <h2 id="days">0</h2>
                <div class="label">Days</div>
            </div>

            <div class="time-box">
                <h2 id="hours">0</h2>
                <div class="label">Hours</div>
            </div>

            <div class="time-box">
                <h2 id="minutes">0</h2>
                <div class="label">Minutes</div>
            </div>

            <div class="time-box">
                <h2 id="seconds">0</h2>
                <div class="label">Seconds</div>
            </div>
        </div>

        <div class="message">

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💙</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

/* Fullscreen container */
.hero {
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

/* Image */
.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;   /* fills entire screen */
    object-position: center; /* keeps center visible */
}
</style>
</head>

<body>

<div class="hero">
    <img src="birthday.png" alt="Happy Birthday">
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Fredoka',sans-serif;
    background:url('bg.png') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* MAIN CONTAINER */
.memo-container{
    position:relative;
    width:100%;
    max-width:900px; /* controlled max width */
    aspect-ratio: 16 / 10; /* keeps proper shape */
}

/* Memo Image */
.memo-bg{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXT */
.memo-content{
    position:absolute;
    top:42%;
    left:50%;
    transform:translate(-50%,-50%);
    width:55%; /* stable width */
    text-align:center;
}

h1{
    font-size:clamp(18px, 2.5vw, 34px);
    margin-bottom:10px;
    color:#5b4bb7;
}

#countdown{
    font-size:clamp(22px, 3vw, 50px);
    font-weight:700;
    margin:8px 0;
    background:linear-gradient(45deg,#ffb6d9,#b5e3ff,#fff4a3,#e5c6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.small{
    font-size:clamp(12px, 1.5vw, 22px);
    margin-top:6px;
    color:#5b4bb7;
}

/* DOG */
.dog{
    position:absolute;
    bottom:2%;
    right:3%;
    width:28%; /* scales with container */
    max-width:260px; /* prevents oversized dog */
}

/* Prevent overflow issues */
img{
    display:block;
}
</style>
</head>

<body>

<div class="memo-container">
    <img src="memo.png" class="memo-bg">

    <div class="memo-content">
        <h1>Countdown to March 5 🎂💖</h1>
        <div id="countdown">Loading...</div>
        <div class="small">Every second brings us closer ✨</div>
    </div>

    <img src="cc.png" class="dog">
</div>

<script>
function getNextBirthday(){
    const now=new Date();
    let year=now.getFullYear();
    let birthday=new Date(year,2,5);

    if(now>birthday){
        birthday=new Date(year+1,2,5);
    }

    return birthday;
}

const birthday=getNextBirthday();

function updateCountdown(){
    const now=new Date().getTime();
    const distance=birthday-now;

    if(distance<=0){
        document.getElementById("countdown").innerHTML =
        "🎉 HAPPY BIRTHDAY MY LOVE 💖🎉";
        return;
    }

    const days=Math.floor(distance/(1000*60*60*24));
    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds=Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>

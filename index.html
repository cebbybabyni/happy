<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown 🥰</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Fredoka',sans-serif;
    background:url('bg.png') no-repeat center center/cover;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:60px;
}

/* 📝 Bigger Memo */
.memo-container{
    width:96vw;          /* bigger */
    max-width:600px;     /* increased */
    position:relative;
}

.memo-container img{
    width:100%;
}

.memo-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    text-align:center;
}

h1{
    font-size:24px;      /* slightly bigger */
    margin-bottom:10px;
    color:#5b4bb7;
}

#countdown{
    font-size:34px;      /* bigger */
    font-weight:700;
    margin:8px 0;
    background:linear-gradient(45deg,#ffb6d9,#b5e3ff,#fff4a3,#e5c6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.small{
    font-size:15px;
    margin-top:8px;
    color:#5b4bb7;
}

/* 🐶 Dog still close */
.dog{
    width:320px;
    margin-top:-50px;   /* stays tucked under memo */
}

/* Tablet */
@media(min-width:768px){

    .memo-container{
        max-width:800px;
    }

    h1{font-size:30px;}
    #countdown{font-size:46px;}
    .small{font-size:18px;}

    .dog{
        width:450px;
        margin-top:-70px;
    }
}

/* Desktop */
@media(min-width:1200px){

    .memo-container{
        max-width:950px;
    }

    h1{font-size:36px;}
    #countdown{font-size:58px;}
    .small{font-size:22px;}

    .dog{
        width:650px;
        margin-top:-90px;
    }
}
</style>
</head>

<body>

<div class="memo-container">
    <img src="memo.png">
    <div class="memo-content">
        <h1>Countdown to March 5 🎂💖</h1>
        <div id="countdown">Loading...</div>
        <div class="small">Every second brings us closer ✨</div>
    </div>
</div>

<img src="cc.png" class="dog">

<script>
function getNextBirthday(){
    const now=new Date();
    let year=now.getFullYear();
    let birthday=new Date(year,2,5);

    if(now>birthday){
        birthday=new Date(year+1,2,5);
    }

    return birthday;
}

const birthday=getNextBirthday();

function updateCountdown(){
    const now=new Date().getTime();
    const distance=birthday-now;

    if(distance<=0){
        document.getElementById("countdown").innerHTML=
        "🎉 HAPPY BIRTHDAY MY LOVE 💖🎉";
        return;
    }

    const days=Math.floor(distance/(1000*60*60*24));
    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds=Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML=
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🍰</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

/* Fullscreen section */
.hero {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background-color: #b9c2d9; /* fallback color */
}

/* Background image */
.hero img {
    position: absolute;
    width: 95%;          /* 👈 slightly smaller */
    height: 95%;         /* 👈 slightly smaller */
    object-fit: contain; /* 👈 prevents heavy cropping */
}

/* Optional overlay content */
.content {
    position: relative;
    text-align: center;
    color: white;
    z-index: 1;
}
</style>
</head>

<body>

<div class="hero">
    <img src="birthday.png" alt="Happy Birthday">
</div>

</body>
</html>

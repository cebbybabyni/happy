<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #b9c2d9; /* match your image background */
    display: flex;
    justify-content: center;
}

/* Wrapper */
.wrapper {
    width: 100%;
    max-width: 1000px; /* prevents it from stretching too much on desktop */
}

/* Image */
.wrapper img {
    width: 100%;      /* full width */
    height: auto;     /* keeps proportions */
    display: block;   /* removes bottom spacing */
}
</style>
</head>

<body>

<div class="wrapper">
    <img src="birthday.png" alt="Happy Birthday">
</div>

</body>
</html>

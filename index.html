<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #b9c2d9; /* matches image background */
}

/* Image container */
.wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Responsive image */
.wrapper img {
    max-width: 100%;
    max-height: 100vh;
    height: auto;
    width: auto;
}
</style>
</head>

<body>

<div class="wrapper">
    <img src="birthday.png" alt="Happy Birthday">
</div>

</body>
</html>

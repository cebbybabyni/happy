<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Fredoka',sans-serif;
    background:url('bg.png') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:80px;
}

/* 📝 Bigger Memo */
.memo-container{
    position:relative;
    width:96vw;
    max-width:650px;
}

.memo-container img{
    width:100%;
    display:block;
}

/* 💖 Text */
.memo-content{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    width:75%;
    text-align:center;
}

h1{
    font-size:22px;
    margin-bottom:10px;
    color:#5b4bb7;
}

#countdown{
    font-size:30px;
    font-weight:700;
    margin:6px 0;
    background:linear-gradient(45deg,#ffb6d9,#b5e3ff,#fff4a3,#e5c6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.small{
    font-size:14px;
    margin-top:8px;
    color:#5b4bb7;
}

/* 🐶 Dog INSIDE memo bottom-right */
.dog{
    position:absolute;
    bottom:10px;
    right:10px;
    width:140px;
}

/* Tablet */
@media(min-width:768px){

    .memo-container{
        max-width:800px;
    }

    h1{font-size:28px;}
    #countdown{font-size:40px;}
    .small{font-size:18px;}

    .dog{
        width:220px;
        bottom:15px;
        right:15px;
    }
}

/* Desktop */
@media(min-width:1200px){

    .memo-container{
        max-width:950px;
    }

    h1{font-size:34px;}
    #countdown{font-size:55px;}
    .small{font-size:22px;}

    .dog{
        width:300px;
        bottom:20px;
        right:20px;
    }
}
</style>
</head>

<body>

<div class="memo-container">
    <img src="memo.png">
    
    <div class="memo-content">
        <h1>Countdown to March 5 🎂💖</h1>
        <div id="countdown">Loading...</div>
        <div class="small">Every second brings us closer ✨</div>
    </div>

    <img src="cc.png" class="dog">
</div>

<script>
function getNextBirthday(){
    const now=new Date();
    let year=now.getFullYear();
    let birthday=new Date(year,2,5);

    if(now>birthday){
        birthday=new Date(year+1,2,5);
    }

    return birthday;
}

const birthday=getNextBirthday();

function updateCountdown(){
    const now=new Date().getTime();
    const distance=birthday-now;

    if(distance<=0){
        document.getElementById("countdown").innerHTML=
        "🎉 HAPPY BIRTHDAY MY LOVE 💖🎉";
        return;
    }

    const days=Math.floor(distance/(1000*60*60*24));
    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds=Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML=
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>

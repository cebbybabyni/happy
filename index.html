<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown to Her Birthday 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: url('bg.png') no-repeat center center/cover;
}

.overlay {
    background: rgba(0, 0, 0, 0.6);
    padding: 50px;
    border-radius: 20px;
}

h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

#countdown {
    font-size: 32px;
    letter-spacing: 2px;
    font-weight: bold;
}

.small {
    margin-top: 15px;
    font-size: 16px;
    opacity: 0.9;
}

@media(max-width: 500px) {
    h1 { font-size: 26px; }
    #countdown { font-size: 20px; }
}
</style>
</head>

<body>

<div class="overlay">
    <h1>Countdown to March 5 🎂💖</h1>
    <div id="countdown">Loading...</div>
    <div class="small">Every second brings us closer ✨</div>
</div>

<script>

function getNextBirthday() {
    const now = new Date();
    let year = now.getFullYear();
    let birthday = new Date(year, 2, 5); // March = 2

    if (now > birthday) {
        birthday = new Date(year + 1, 2, 5);
    }

    return birthday;
}

const birthday = getNextBirthday();

function updateCountdown() {
    const now = new Date().getTime();
    const distance = birthday - now;

    if (distance <= 0) {
        document.getElementById("countdown").innerHTML =
            "🎉 HAPPY BIRTHDAY MY LOVE 💖🎉";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
